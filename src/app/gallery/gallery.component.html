<main class="main style4">
    <div class="medium-break"></div>
    <h2>Photo Gallery</h2>

    <div class="gallery">
        <figure  *ngFor='let image of images' (click)="showOverlay(image)">
            <img [src]='image.image'
                 [alt]="image.title">

            <figcaption>
                <p>{{image.title}}</p>
            </figcaption>
        </figure>
    </div>
    <div class="medium-break"></div>
</main>

<div class="medium-break"></div>
